<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kate's Memory Scrapbook</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700;1,900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Alex+Brush&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Link to Stylesheet -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <!-- 1. Splash Screen -->
    <div id="splash-screen" class="splash-container">
        <div class="splash-card">
            <h1 class="splash-welcome">Hello, Kate</h1>
            <h2 class="splash-name">WELCOME BACK</h2>
            <p class="splash-tagline">Step inside a scrapbooked gallery of your beautiful memories.</p>
            <button id="start-experience-btn" class="btn-primary">
                <span class="btn-text">Open Scrapbook</span>
                <span class="btn-icon">✦</span>
            </button>
        </div>
    </div>

    <!-- 2. Main Scrapbook Screen -->
    <div id="main-app" class="scene hidden">
        
        <!-- Background Ambient Grid/Lights -->
        <div class="ambient-glow"></div>

        <!-- Floating Header -->
        <header class="header">
            <h1 class="main-title">HELLO, KATE!</h1>
            <div id="birthday-countdown" class="birthday-countdown-corner">
                <span id="days-to-birthday-val">--</span> days to next birthday ✦
            </div>
        </header>

        <!-- Central Countdown Frame -->
        <div class="timer-box glass-card">
            <span class="it-been">IT'S BEEN...</span>
            
            <div class="timer-row c1">
                <span class="val" id="y">--</span>
                <span class="unit">Years</span>
            </div>
            <div class="timer-row c2">
                <span class="val" id="m">--</span>
                <span class="unit">Months</span>
            </div>
            <div class="timer-row c3">
                <span class="val" id="d">--</span>
                <span class="unit">Days</span>
            </div>
            <div class="timer-row c4">
                <span class="val" id="h">--</span>
                <span class="unit">Hours</span>
            </div>
            <div class="timer-row c5">
                <span class="val" id="mi">--</span>
                <span class="unit">Minutes</span>
            </div>
            <div class="timer-row c6">
                <span class="val" id="s">--</span>
                <span class="unit">Seconds</span>
            </div>

            <span class="it-been" style="margin-top: 1.5vh">SINCE YOU ARRIVED!</span>
        </div>

        <!-- Scattered Polaroid Gallery Wall -->
        <div id="gallery" class="gallery-wall">
            <!-- 10 Polaroids will be dynamically generated by JS here -->
        </div>

        <!-- Floating Bottom-Left Album Trigger Button -->
        <button id="album-trigger-btn" class="floating-album-btn">
            <span class="btn-icon">📖</span>
            <span class="btn-text">Album</span>
        </button>

        <!-- Floating Bottom-Right Mode Toggle Widget -->
        <div id="mode-toggle-widget" class="mode-toggle-widget glass-card">
            <button id="mode-normal-btn" class="toggle-btn active">Normal</button>
            <button id="mode-bhondu-btn" class="toggle-btn">Bhondu 🤪</button>
        </div>

        <!-- Floating Bottom-Middle Audio Control Widget -->
        <div class="floating-audio-widget glass-card">
            <button id="play-pause-btn" class="audio-btn" aria-label="Play/Pause">
                <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg id="pause-icon" class="hidden" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <div class="audio-progress-area">
                <input type="range" id="audio-progress" min="0" max="100" value="0" aria-label="Audio Playback Progress">
                <div class="audio-time-row">
                    <span id="audio-time-current">0:00</span>
                    <span id="audio-time-duration">0:00</span>
                </div>
            </div>
            <button id="mute-btn" class="audio-btn-small" aria-label="Mute">
                <svg id="volume-up-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
                <svg id="volume-off-icon" class="hidden" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                </svg>
            </button>
        </div>

    </div>

    <!-- 4. Lightbox Modal -->
    <div id="lightbox-modal" class="lightbox hidden">
        <button class="lightbox-close" id="lightbox-close-btn" aria-label="Close modal">×</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Full size image">
            <div class="lightbox-caption">
                <span id="lightbox-date"></span>
                <span id="lightbox-details"></span>
            </div>
        </div>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev-btn" aria-label="Previous image">‹</button>
        <button class="lightbox-nav lightbox-next" id="lightbox-next-btn" aria-label="Next image">›</button>
    </div>

    <!-- 5. Album Grid Modal Overlay -->
    <div id="album-modal" class="album-modal hidden">
        <div class="album-modal-content glass-card">
            <div class="album-modal-header">
                <h2 class="album-modal-title">Kate's Memory Album</h2>
                <button id="album-close-btn" class="album-modal-close" aria-label="Close album">×</button>
            </div>
            <div class="album-modal-grid-container">
                <div id="album-thumbnails-grid" class="album-thumbnails-grid">
                    <!-- 98 thumbnails will be dynamically rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden native audio element -->
    <audio id="bg-music" src="Candles_at_Daybreak.mp3" loop></audio>

    <!-- Script Entry -->
    <script type="module" src="index.js"></script>
</body>
</html>
